name: Linux intel build and test workflow

# Intel/icpx is gated to manual runs only (called from cmake.yml on
# workflow_dispatch). History: icx/icpx 2026.0.0 was unusable here -- it ICE'd
# in X86 TLS lowering on our headers AND its per-TU memory peaks blew past
# ubuntu-latest's 16GB even at Debug + -j1. merge_yml.py now pins 2025.2.0,
# which has neither problem: it compiles and links the whole tree well under
# 16GB (validated with BUILD_PYTHON=OFF). The gate stays until a manual run
# confirms the full BUILD_PYTHON=ON build green on a real runner (the heavy
# ComputeGraph pybind TU is the last unvalidated piece); then drop the
# workflow_dispatch condition in cmake.yml to run it on every push/PR.

on:
  workflow_call:
    inputs:
      build_ref:
        type: string
        required: false
      build_cache_suffix:
        type: string
        required: false
        default: "default"
      build_cache_size:
        type: string
        required: false
        default: 2G
      build_configure_extra_args:
        type: string
        required: false

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # All intel variants share build_type=Debug — -O0 skips the template
        # instantiation optimizer passes that drive peak memory. Variant is the
        # MKL integer interface (default = unset, lp64, ilp64 + extended prec).
        compiler: [ intel ]
        blas: [ mkl ]
        build_type: [ Debug ]
        variant: [ default, lp64, ilp64 ]
        include:
          - variant: default
            cmake_extra: >
              -DCMAKE_C_COMPILER=icx
              -DCMAKE_CXX_COMPILER=icpx
              -DCMAKE_CXX_FLAGS="--gcc-toolchain=${CONDA_PREFIX} --sysroot=${CONDA_PREFIX}/${HOST}/sysroot -target ${HOST}"
              -DOpenMP_CXX_INCLUDE_DIR="${CONDA_PREFIX}/include"
          - variant: lp64
            cmake_extra: >
              -DCMAKE_C_COMPILER=icx
              -DCMAKE_CXX_COMPILER=icpx
              -DMKL_INTERFACE=lp64
              -DCMAKE_CXX_FLAGS="--gcc-toolchain=${CONDA_PREFIX} --sysroot=${CONDA_PREFIX}/${HOST}/sysroot -target ${HOST}"
              -DOpenMP_CXX_INCLUDE_DIR="${CONDA_PREFIX}/include"
          - variant: ilp64
            cmake_extra: >
              -DCMAKE_C_COMPILER=icx
              -DCMAKE_CXX_COMPILER=icpx
              -DMKL_INTERFACE=ilp64
              -DCMAKE_CXX_FLAGS="--gcc-toolchain=${CONDA_PREFIX} --sysroot=${CONDA_PREFIX}/${HOST}/sysroot -target ${HOST}"
              -DENABLE_EXTENDED_PRECISION=ON

    name: "${{ matrix.compiler }} • ${{ matrix.blas }} • ${{ matrix.build_type }} • ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: $GITHUB_WORKSPACE/build_cache_${{ inputs.build_cache_suffix }}
      CCACHE_MAXSIZE: ${{ inputs.build_cache_size }}
    defaults:
      run:
        shell: bash -el {0}
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          path: src
          submodules: recursive

      - name: Cache Build Cache
        uses: actions/cache@v4
        with:
          path: build_cache_${{ inputs.build_cache_suffix }}
          key: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-

      - name: Set up conda environment
        uses: ./src/.github/actions/setup-conda-env
        with:
          compiler: ${{ matrix.compiler }}
          blas: ${{ matrix.blas }}
          source-dir: src

      - name: Configure CMake
        run: |
          cmake \
            -G Ninja \
            -S "$GITHUB_WORKSPACE/src" \
            -B "$GITHUB_WORKSPACE/build" \
            -D EINSUMS_BUILD_PYTHON=ON \
            -D Python_EXECUTABLE="${CONDA_PREFIX}/bin/python3" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D EINSUMS_SHOW_WARNING=OFF \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/installed" \
            -D CMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            ${{ matrix.cmake_extra }} ${{ inputs.build_configure_extra_args }}

      - name: Build and Install
        run: |
          # -j1, conservatively: icx 2025.2 is far lighter than 2026 (the core
          # tree builds at -j2 under 8GB with BUILD_PYTHON=OFF), but this leg is
          # BUILD_PYTHON=ON and the ComputeGraph pybind TU is the heaviest in the
          # build. Keep -j1 until a manual run confirms -j2 fits the 16GB runner
          # with bindings on, then bump it.
          cmake --build "${{ github.workspace }}/build" --config ${{ matrix.build_type }} --target install -j1

      - name: ccache statistics
        run: ccache -sv 2>/dev/null || ccache -s

      - name: Test (CTest) - Unit Tests
        working-directory: "${{ github.workspace }}/build"
        run: ctest --rerun-failed --output-on-failure -j2
