name: Documentation

on:
  workflow_call:
    inputs:
      build_ref:
        type: string
        required: false
      build_cache_suffix:
        type: string
        required: false
        default: "default"
      build_cache_size:
        type: string
        required: false
        default: 2G
      build_configure_extra_args:
        type: string
        required: false

permissions:
  contents: write

jobs:
  # Build job
  build:
    defaults:
      run:
        shell: bash -el {0}
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: $GITHUB_WORKSPACE/build_cache_${{ inputs.build_cache_suffix }}
      CCACHE_MAXSIZE: ${{ inputs.build_cache_size }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          submodules: recursive

      - name: Cache Build Cache
        uses: actions/cache@v4
        with:
          path: build_cache_${{ inputs.build_cache_suffix }}
          key: einsums-docs-${{ runner.os }}-${{ inputs.build_cache_suffix }}-${{ github.sha }}
          restore-keys: einsums-docs-${{ runner.os }}-${{ inputs.build_cache_suffix }}-

      - name: Set up conda environment
        uses: ./.github/actions/setup-conda-env
        with:
          compiler: default
          blas: openblas
          docs: "true"
          source-dir: "."

      - name: Configure CMake
        run: |
          cmake \
            -G Ninja \
            -S "$GITHUB_WORKSPACE" \
            -B "$GITHUB_WORKSPACE/build" \
            -D EINSUMS_BUILD_PYTHON=ON \
            -D EINSUMS_WITH_COVERAGE=ON \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D CMAKE_BUILD_TYPE=Debug \
            -D EINSUMS_SHOW_WARNING=OFF \
            -D EINSUMS_WITH_DOCUMENTATION=ON \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/installed" \
            -D CMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            ${{ inputs.build_configure_extra_args }}

      - name: Build Documentation
        # The docs are generated statically from the headers by the einsums-pybind
        # libclang tool; the `docs` target pulls in that tool and the codegen, so
        # there is no need to compile/link the Einsums library or the PyEinsums
        # (_core) extension first.
        run: |
          cmake --build "${{ github.workspace }}/build" --config Debug --target docs -j4

      - name: Copy Documentation
        run: |
          mkdir -p ${{ github.workspace }}/share/Einsums/docs/html
          cp -rv ${{ github.workspace }}/build/share/Einsums/docs/html/* ${{ github.workspace }}/share/Einsums/docs/html

      - name: GitHub Pages Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.event_name == 'push' && github.repository == 'Einsums/Einsums' && ( startsWith( github.ref, 'refs/tags/' ) || github.ref == 'refs/heads/main' )
        with:
          branch: gh-pages
          folder: ${{ github.workspace }}/share/Einsums/docs/html
