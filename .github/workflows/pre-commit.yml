name: Pre-Commit Checks
on:
  pull_request:
  workflow_dispatch:

concurrency:
  #  Cancel a currently running workflow from the same PR or commit hash.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  detect_changes:
    name: "Detect Changes"
    uses: ./.github/workflows/detect-changes.yml

  format:
    name: Format Files
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'cmake') || contains(needs.detect_changes.outputs.filters, 'cpp') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch itself (not the detached merge ref) so an
          # auto-formatting commit can be pushed back. Empty on workflow_dispatch.
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        id: format
        run: |
          set +e
          # pre-commit hooks (clang-format, cmake-format, insert-license) rewrite
          # files in place and exit non-zero when they change anything.
          pre-commit run --all-files --show-diff-on-failure | tee pre-commit-output.txt
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            echo "needs_formatting=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs_formatting=1" >> "$GITHUB_OUTPUT"

          FORMATTED_FILES=""
          grep -q "Fixing .*cmake-format" pre-commit-output.txt && FORMATTED_FILES="${FORMATTED_FILES}CMake files, "
          grep -q "Fixing .*clang-format" pre-commit-output.txt && FORMATTED_FILES="${FORMATTED_FILES}C++ files, "
          grep -q "Fixing .*insert-license" pre-commit-output.txt && FORMATTED_FILES="${FORMATTED_FILES}license headers, "
          FORMATTED_FILES="${FORMATTED_FILES%, }"
          echo "formatted_files=$FORMATTED_FILES" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        # Auto-commit only works for same-repo PRs (fork PRs get a read-only token).
        if: >-
          steps.format.outputs.needs_formatting == '1'
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Apply code formatting and license headers

          Co-authored-by: ${{ github.event.pull_request.user.login }} <${{ github.event.pull_request.user.login }}@users.noreply.github.com>"
          git push

      - name: Add PR comment
        if: >-
          steps.format.outputs.needs_formatting == '1'
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const formattedFiles = '${{ steps.format.outputs.formatted_files }}' || 'files';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `👋 I have formatted the ${formattedFiles} in this PR using pre-commit hooks. The changes have been committed automatically.`
            })

      - name: Fail if a fork PR needs formatting
        # Fork PRs cannot be auto-committed; surface the failure with guidance.
        if: >-
          steps.format.outputs.needs_formatting == '1'
          && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Formatting required. Run 'pre-commit run --all-files' locally and commit the result." >&2
          exit 1
