name: CMake

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  #  Cancel a currently running workflow from the same PR or commit hash.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Stacked-PR economy: the stack merges bottom-up and the TOP PR's CI proves
# the whole union builds (intermediate PRs are documented expected-red
# standalone below the bindings PR). Heavy build legs therefore run only on
# non-stack PRs, on the stack PR carrying the 'ci-full' label (keep it on the
# top of the stack; move it when the stack grows), on pushes to main, and on
# manual dispatch. This cuts a cascade's Actions cost ~10x and stops the
# cache-eviction storms that came with it.

jobs:
  detect_changes:
    name: "Detect Changes"
    uses: ./.github/workflows/detect-changes.yml

  linux_default:
    name: Linux
    needs: [ detect_changes ]
    if: ${{ (contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src')) && (github.event_name != 'pull_request' || !startsWith(github.head_ref, 'stack/') || contains(github.event.pull_request.labels.*.name, 'ci-full')) }}
    uses: ./.github/workflows/linux-build-and-test.yml

  # intel/icpx is gated to manual runs only: icpx's per-TU memory exceeds
  # ubuntu-latest's 16GB even at -O0 -j1 and OOM-kills the runner. Trigger
  # from the Actions UI (workflow_dispatch) when you actively want icpx
  # validation.
  linux_intel:
    name: Linux (intel)
    needs: [ detect_changes ]
    if: ${{ github.event_name == 'workflow_dispatch' && (contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src')) }}
    uses: ./.github/workflows/linux-intel-build.yml

  windows_default:
    name: Windows
    needs: [ detect_changes ]
    if: ${{ (contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src')) && (github.event_name != 'pull_request' || !startsWith(github.head_ref, 'stack/') || contains(github.event.pull_request.labels.*.name, 'ci-full')) }}
    uses: ./.github/workflows/windows-build-and-test.yml

  macos_default:
    name: macOS
    needs: [ detect_changes ]
    if: ${{ (contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src')) && (github.event_name != 'pull_request' || !startsWith(github.head_ref, 'stack/') || contains(github.event.pull_request.labels.*.name, 'ci-full')) }}
    uses: ./.github/workflows/macos-build-and-test.yml

  sanitizers:
    name: Sanitizers
    needs: [ detect_changes ]
    if: ${{ (contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src')) && (github.event_name != 'pull_request' || !startsWith(github.head_ref, 'stack/') || contains(github.event.pull_request.labels.*.name, 'ci-full')) }}
    uses: ./.github/workflows/linux-build-and-test-sanitizer.yml

  documentation:
    name: Documentation
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'docs') }}
    uses: ./.github/workflows/docs.yml
