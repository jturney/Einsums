name: CMake

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  #  Cancel a currently running workflow from the same PR or commit hash.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  detect_changes:
    name: "Detect Changes"
    uses: ./.github/workflows/detect-changes.yml

  linux_default:
    name: Linux
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src') }}
    uses: ./.github/workflows/linux-build-and-test.yml
    with:
      # Auto-runs (push/PR) skip the intel/icpx matrix entries — icpx's
      # per-TU memory exceeds ubuntu-latest's 16GB even at -O0 -j1, so it
      # always OOM-kills the runner. Flip on by running the CMake workflow
      # manually from the Actions tab when you actively want icpx validation.
      run_intel: ${{ github.event_name == 'workflow_dispatch' }}

  macos_default:
    name: macOS
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src') }}
    uses: ./.github/workflows/macos-build-and-test.yml

  sanitizers:
    name: Sanitizers
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'ci') || contains(needs.detect_changes.outputs.filters, 'src') }}
    uses: ./.github/workflows/linux-build-and-test-sanitizer.yml

  documentation:
    name: Documentation
    needs: [ detect_changes ]
    if: ${{ contains(needs.detect_changes.outputs.filters, 'docs') }}
    uses: ./.github/workflows/docs.yml
