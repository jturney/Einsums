name: Sanitizers

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      build_ref:
        type: string
        required: false
      build_cache_suffix:
        type: string
        required: false
        default: "default"
      build_cache_size:
        type: string
        required: false
        default: 2G
      build_configure_extra_args:
        type: string
        required: false

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # compiler = default, implies the default compiler for the platform. for linux, this is gcc/g++
        compiler: [ default ]
        blas: [ openblas ]
        build_type: [ Debug ]
        variant: [ default ]
        sanitizer:
          - address,leak,undefined
          - thread

    name: "${{ matrix.sanitizer }} • ${{ matrix.compiler }} • ${{ matrix.blas }} • ${{ matrix.build_type }} • ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: $GITHUB_WORKSPACE/build_cache_${{ inputs.build_cache_suffix }}
      CCACHE_MAXSIZE: ${{ inputs.build_cache_size }}
    defaults:
      run:
        shell: bash -el {0}
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          path: src

      - name: Cache Build Cache
        uses: actions/cache@v4
        with:
          path: build_cache_${{ inputs.build_cache_suffix }}
          key: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-

      - name: Set up conda environment
        uses: ./src/.github/actions/setup-conda-env
        with:
          compiler: ${{ matrix.compiler }}
          blas: ${{ matrix.blas }}
          source-dir: src

      - name: Configure CMake
        # Build the Python bindings on the ThreadSanitizer leg so the Python
        # test suite (registered as ctest "*Python" entries) runs under TSan.
        # This is the path that exercises kernels multithreaded: a single-node
        # capture graph executes its op on the MAIN thread (omp = ncores),
        # whereas the C++ unit-test TUs frequently instantiate the same
        # templates in a context that runs serially. A data race in e.g.
        # impl_gemv_noncontiguous is therefore only reachable through Python
        # — see bug-dropped-view-gemv-flaky-element. Kept OFF on the
        # address/leak/undefined leg: ASan+Python needs its own libasan
        # preload dance and would not have caught a *race* anyway.
        run: |
          cmake \
            -G Ninja \
            -S "$GITHUB_WORKSPACE/src" \
            -B "$GITHUB_WORKSPACE/build" \
            -D EINSUMS_BUILD_PYTHON=${{ matrix.sanitizer == 'thread' && 'ON' || 'OFF' }} \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D EINSUMS_WITH_SANITIZERS=${{ matrix.sanitizer }} \
            -D EINSUMS_SHOW_WARNING=OFF \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/installed" \
            -D CMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            ${{ inputs.build_configure_extra_args }}

      - name: Build and Install
        run: |
          # -j2 caps ninja parallelism: GitHub Linux runners have 16GB RAM and
          # sanitizer-instrumented compiles are even heavier than -O2 (TSan/ASan
          # add ~2-3x peak per TU). Ninja's default (nproc+2 = 6) puts us over
          # the line and the runner OOM-kills the build. -j2 keeps two workers
          # in flight, well under budget.
          cmake --build "${{ github.workspace }}/build" --config ${{ matrix.build_type }} --target install -j2

      - name: Test (CTest) - C++ unit tests
        working-directory: "${{ github.workspace }}/build"
        # UBSan is recoverable by default: it prints "runtime error:" and continues
        # with exit 0, so a finding would NOT fail ctest. halt_on_error=1 turns every
        # UB report into an abort -> non-zero exit -> red CI. ASan/LSan already abort.
        #
        # Exclude the Python-binding tests here: they load the instrumented
        # _core.so into a non-instrumented interpreter and need a runtime
        # preload (handled in the dedicated step below). The filter is a no-op
        # on the address/leak/undefined leg, where Python isn't built.
        env:
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1:report_error_type=1
          ASAN_OPTIONS: abort_on_error=1:print_stacktrace=1
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:suppressions=${{ github.workspace }}/src/devtools/sanitizers/tsan.supp
        run: ctest --output-on-failure -E '[Pp]ython'

      - name: Test (CTest) - Python unit tests under ThreadSanitizer
        if: ${{ matrix.sanitizer == 'thread' }}
        working-directory: "${{ github.workspace }}/build"
        # The Python interpreter is not TSan-instrumented but dlopen's an
        # instrumented _core.so, so the TSan runtime must be preloaded into the
        # interpreter (otherwise it aborts with "interceptors not installed").
        # GCC's OpenMP runtime (libgomp) is also uninstrumented and TSan does
        # not model its barriers/reductions, so some OpenMP-internal reports are
        # false positives — quiet known ones via the committed suppressions
        # file; a genuine race in our own kernels (the target of this leg) still
        # fails because halt_on_error=1.
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1:report_thread_leaks=0:suppressions=${{ github.workspace }}/src/devtools/sanitizers/tsan.supp
        run: |
          libtsan="$(gcc -print-file-name=libtsan.so)"
          echo "Preloading TSan runtime: ${libtsan}"
          LD_PRELOAD="${libtsan}" ctest --output-on-failure -R '[Pp]ython'
