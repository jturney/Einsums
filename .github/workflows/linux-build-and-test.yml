name: Linux build and test workflow
on:
  workflow_call:
    inputs:
      build_ref:
        type: string
        required: false
      build_cache_suffix:
        type: string
        required: false
        default: "default"
      build_cache_size:
        type: string
        required: false
        default: 2G
      build_configure_extra_args:
        type: string
        required: false

permissions: read-all

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # compiler = default implies the default compiler for the platform; for linux this is gcc/g++.
        # clang is also available; merge_yml.py injects the matching conda toolchain.
        # intel (icx/icpx) lives in linux-intel-build.yml — it's gated to manual
        # runs because icpx's per-TU memory blows past the 16GB ubuntu-latest
        # runner even at -O0 -j1.
        compiler: [ default, clang ]
        blas: [ openblas, mkl ]
        build_type: [ RelWithDebInfo ]
        variant: [ default ]
        include:
          - compiler: default
            cmake_extra: >
              -DEINSUMS_WITH_COVERAGE=ON
        exclude:
          # clang leg is openblas-only (mkl pairs with the intel toolchain).
          - compiler: clang
            blas: mkl

    name: "${{ matrix.compiler }} • ${{ matrix.blas }} • ${{ matrix.build_type }} • ${{ matrix.variant }}"
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: $GITHUB_WORKSPACE/build_cache_${{ inputs.build_cache_suffix }}
      CCACHE_MAXSIZE: ${{ inputs.build_cache_size }}
    defaults:
      run:
        shell: bash -el {0}
    steps:

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.build_ref }}
          path: src

      - name: Cache Build Cache
        uses: actions/cache@v4
        with:
          path: build_cache_${{ inputs.build_cache_suffix }}
          key: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-${{ github.sha }}
          restore-keys: einsums-${{ runner.os }}-${{ matrix.build_type }}-${{ inputs.build_cache_suffix }}-${{ matrix.compiler }}-${{ matrix.blas }}-${{ matrix.variant }}-

      - name: Set up conda environment
        uses: ./src/.github/actions/setup-conda-env
        with:
          compiler: ${{ matrix.compiler }}
          blas: ${{ matrix.blas }}
          source-dir: src

      - name: Configure CMake
        run: |
          cmake \
            -G Ninja \
            -S "$GITHUB_WORKSPACE/src" \
            -B "$GITHUB_WORKSPACE/build" \
            -D EINSUMS_BUILD_PYTHON=ON \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D CMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -D EINSUMS_SHOW_WARNING=OFF \
            -D CMAKE_INSTALL_PREFIX="${{ github.workspace }}/installed" \
            -D CMAKE_PREFIX_PATH="${CONDA_PREFIX}" \
            ${{ matrix.cmake_extra }} ${{ inputs.build_configure_extra_args }}

      - name: Build and Install
        run: |
          # Cap ninja parallelism to fit the 16GB GitHub Linux runner: heavy
          # template instantiations (ComputeGraph + TensorAlgebra) peak at
          # ~3-4GB per TU under -O2 and ninja's default (nproc+2 = 6) OOM-kills
          # the runner mid-link. -j2 leaves comfortable headroom on default/clang.
          cmake --build "${{ github.workspace }}/build" --config Release --target install -j2

      # The Python test suite is registered as ctest entries (labelled PYTHON)
      # by einsums_add_python_unit_test, so this single ctest run exercises both
      # the C++ and the Python bindings — no separate pytest step is needed.
      - name: Test (CTest) - Unit Tests
        working-directory: "${{ github.workspace }}/build"
        run: ctest --rerun-failed --output-on-failure -j4

      - name: Generate Python coverage
        if: ${{ contains(matrix.compiler, 'default') }}
        # The ctest Python runs accumulate coverage data under
        # build/python-coverage/ (enabled by EINSUMS_WITH_COVERAGE). Render it
        # to XML; run from the repo root so the rcfile [paths] remap resolves
        # the canonical source dir for Codecov annotation.
        working-directory: "${{ github.workspace }}/src"
        env:
          COVERAGE_FILE: "${{ github.workspace }}/build/python-coverage/.coverage"
          COVERAGE_RCFILE: "${{ github.workspace }}/build/python-coverage/.coveragerc"
        # `parallel = True` in the rcfile produces one `.coverage.<host>.<pid>`
        # file per pytest worker (alongside COVERAGE_FILE's path); combine them
        # before rendering XML. `coverage combine` without an argument only
        # looks in CWD, but CWD here is `src/` (set so the rcfile's [paths]
        # remap resolves the source dir for Codecov annotation), and the
        # per-process data files live in `build/python-coverage/`. Pass the
        # data directory as a positional argument so combine actually finds
        # them; without it the step fails with "No data to combine".
        run: |
          coverage combine "${{ github.workspace }}/build/python-coverage"
          coverage xml -o "${{ github.workspace }}/build/python-coverage/coverage.xml"

      - name: Generate coverage information
        if: ${{ contains(matrix.compiler, 'default') }}
        working-directory: "${{github.workspace}}/build"
        run: |
          export NOTES=$(find . -name "*.gcno")
          export SOURCES=$(for i in ${NOTES//.gcno/}; do echo "../src/$i"; done)
          echo "NOTES=$NOTES"
          echo "SOURCES=$SOURCES"
          gcov -r $SOURCES || echo "returned $?"
          # Force lcov to use the conda env's gcov: the build is gcc 15 (.gcda
          # format "B52*"), but lcov can pick up the runner's system gcov 13.3
          # ("B33*") by default and bail with "geninfo: ERROR: GCOV failed ...
          # prefer version 'B33*'". Pinning --gcov-tool keeps the toolchain
          # consistent.
          lcov --gcov-tool "${CONDA_PREFIX}/bin/gcov" --capture --directory . --output-file coverage.info --exclude \*/_deps/\* --exclude /usr/\* --exclude \*/einsums-env/\*

      - name: Upload C++ coverage to Codecov
        if: ${{ contains(matrix.compiler, 'default') }}
        uses: codecov/codecov-action@v5
        with:
          directory: "${{github.workspace}}/src"
          working-directory: "${{github.workspace}}/src"
          disable_search: true
          files: ${{github.workspace}}/build/coverage.info
          flags: cpp,linux
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Python coverage to Codecov
        if: ${{ contains(matrix.compiler, 'default') }}
        uses: codecov/codecov-action@v5
        with:
          directory: "${{github.workspace}}/src"
          working-directory: "${{github.workspace}}/src"
          disable_search: true
          flags: python,linux
          files: ${{github.workspace}}/build/python-coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Test (find_package) - consume installation
        working-directory: "${{github.workspace}}/src/testing/consume"
        shell: bash -l {0}
        run: |
          cmake -S . \
            -B build \
            -G Ninja \
            --log-level verbose \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_PREFIX_PATH="${CONDA_PREFIX};${CONDA_PREFIX}/Library;${{ github.workspace }}/installed"
          cmake --build build
          ./build/HelloWorld
