name: einsums
channels: 
  - conda-forge
  - nodefaults
dependencies:
  - cmake
  - ccache
  - cxx-compiler
  - ninja
  # Prebuilts to save einsums the work
  - catch2
  - fftw
  - fmt >=12,<13  # clang 22 / macOS libc++ needs fmt 12 (11.0.x fails consteval, 11.1+ fails the malloc allocator)
  - cpptrace
  # spdlog is built from source against fmt 12 (Einsums_SetupSpdlog); conda has no fmt-12-compatible spdlog
  # HDF5
  # * zlib brings headers; hdf5 package only bring libzlib
  - hdf5
  - zlib
  - numpy
  - mimalloc
  # Python stuff
  - pybind11
  - numpy
  - scipy
  - libblas[build=*openblas]
  - openblas[build=*openmp*]
  - fftw
